<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B10"/>
      <stop offset="0.55" stop-color="#151827"/>
      <stop offset="1" stop-color="#090D13"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .title { font-size: 30px; font-weight: 700; fill: #CDD6F4; }
      .muted { fill: #A6ADC8; }
      .blue { fill: #89B4FA; }
      .mauve { fill: #CBA6F7; }
      .green { fill: #A6E3A1; }
      .teal { fill: #94E2D5; }
      .peach { fill: #FAB387; }
      .cursor { animation: blink 1s steps(2,start) infinite; }
      .float { animation: float 6s ease-in-out infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    </style>
  </defs>

  <rect width="1200" height="460" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="457" rx="24.5" stroke="#313244" stroke-width="3"/>
  <rect x="34" y="38" width="1132" height="384" rx="10" fill="#111520" stroke="#45475A" stroke-width="2"/>

  <circle cx="64" cy="68" r="8" fill="#F38BA8"/>
  <circle cx="90" cy="68" r="8" fill="#F9E2AF"/>
  <circle cx="116" cy="68" r="8" fill="#A6E3A1"/>

  <g class="float" filter="url(#glow)">
    <text x="70" y="130" class="mono blue" font-size="24">➜</text>
    <text x="108" y="130" class="mono muted" font-size="24">whoami</text>

    <text x="70" y="178" class="mono title">M Zain Ul Hassan Baloch</text>

    <text x="70" y="222" class="mono mauve" font-size="25">AI/Full-Stack Engineer</text>
    <text x="430" y="222" class="mono muted" font-size="25">|</text>
    <text x="465" y="222" class="mono teal" font-size="25">Technical Partner</text>

    <text x="70" y="275" class="mono green" font-size="22">RAG · agents · SaaS platforms · cloud apps</text>
    <text x="70" y="324" class="mono peach" font-size="21">from concepts to production-grade AI apps</text>

    <text x="70" y="384" class="mono muted" font-size="17">stack:</text>
    <text x="140" y="384" class="mono blue" font-size="17">TypeScript</text>
    <text x="244" y="384" class="mono muted" font-size="17">·</text>
    <text x="266" y="384" class="mono blue" font-size="17">Python</text>
    <text x="338" y="384" class="mono muted" font-size="17">·</text>
    <text x="360" y="384" class="mono blue" font-size="17">Node.js</text>
    <text x="444" y="384" class="mono muted" font-size="17">·</text>
    <text x="466" y="384" class="mono blue" font-size="17">React.js</text>
    <text x="552" y="384" class="mono muted" font-size="17">·</text>
    <text x="574" y="384" class="mono blue" font-size="17">FastAPI</text>
    <text x="664" y="384" class="mono muted" font-size="17">·</text>
    <text x="686" y="384" class="mono blue" font-size="17">Azure</text>
    <rect x="762" y="368" width="10" height="20" fill="#CDD6F4" class="cursor"/>
  </g>
</svg>
