<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B10"/>
      <stop offset="0.55" stop-color="#151827"/>
      <stop offset="1" stop-color="#090D13"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89B4FA"/>
      <stop offset="0.5" stop-color="#CBA6F7"/>
      <stop offset="1" stop-color="#94E2D5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .title { font-size: 30px; font-weight: 700; fill: #CDD6F4; }
      .muted { fill: #A6ADC8; }
      .blue { fill: #89B4FA; }
      .mauve { fill: #CBA6F7; }
      .green { fill: #A6E3A1; }
      .teal { fill: #94E2D5; }
      .peach { fill: #FAB387; }
      .cursor { animation: blink 1s steps(2,start) infinite; }
      .float { animation: float 6s ease-in-out infinite; }
      .scan { animation: scan 5.5s linear infinite; opacity: .22; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes scan { 0% { transform: translateY(-80px); } 100% { transform: translateY(470px); } }
    </style>
  </defs>

  <rect width="1200" height="430" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="427" rx="24.5" stroke="#313244" stroke-width="3"/>
  <rect x="34" y="38" width="1132" height="354" rx="10" fill="#111520" stroke="#45475A" stroke-width="2"/>

  <g class="scan">
    <rect x="36" y="0" width="1128" height="65" fill="url(#accent)" opacity="0.22"/>
  </g>

  <circle cx="64" cy="68" r="8" fill="#F38BA8"/>
  <circle cx="90" cy="68" r="8" fill="#F9E2AF"/>
  <circle cx="116" cy="68" r="8" fill="#A6E3A1"/>
